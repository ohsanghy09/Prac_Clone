<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-10">

  <div class="relative inline-block group">
    <!-- 메뉴 버튼 -->
    <button class="px-4 py-2 border border-zinc-600 bg-black">
      메뉴 ▼
    </button>

    <!-- 드롭다운 -->
    <div class="absolute left-1/2 top-full z-10 hidden w-56 -translate-x-1/2 border border-zinc-700 bg-black group-hover:block">
        <button class="block w-full px-4 py-3 text-center hover:bg-zinc-800">홈</button>
      <button class="block w-full px-4 py-3 text-center hover:bg-zinc-800">시리즈</button>
      <button class="block w-full px-4 py-3 text-center hover:bg-zinc-800">영화</button>
      <button class="block w-full px-4 py-3 text-center hover:bg-zinc-800">게임</button>
    </div>
  </div>

</body>
</html>
