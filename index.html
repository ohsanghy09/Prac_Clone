<!DOCTYPE html>

<!-- 한국어로 작성 -->
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TailWind</title>
  <!-- CDN : Content Delivery Network, 인터넷에 있는 파일을 링크로 가져다 쓰는 것. -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- 배경색 블랙, 텍스트는 화이트로, grid로 이차원 배열 -->

<body class="bg-black text-white grid">

  <!-- header와 main의 배치 -->
  <div class="relative">

    <!-- 헤더 grid로 내부 요소 배치 -->
    <header class="grid">


      <!-- 비디오 배경, 여기서 column과 row의 start가 의미하는 건 "행렬" -->
      <video src="./resource/dvd.mp4" autoplay muted loop aspect-video
        class="col-start-1 row-start-1 w-full h-full"></video>


      <!-- 네비게이션 속성 행렬(1, 1)에 요소 배치  -->
      <nav class="col-start-1 row-start-1 ml-[4vw] mt-[1vw] mr-[4vw] ">


        <!-- 왼쪽 넷플릭스, 메뉴들 -->
        <div class="flex gap-[1vw] origin-top-left text-white text-[0.9vw]">

          <!-- 텍스트 및 폰트 조정, 넷플의 글자간격 가깝게, 색상 강도 조정   -->
          <button class="text-[2vw] font-extrabold tracking-tight text-red-600">NETFLIX</button>

          <!-- 화면창 lg 이상일 경우 flex 아니면 hidden -->
          <div class="hidden lg:flex gap-[0.8vw] mt-[0.2vw]">
            <button>홈</button>
            <button>시리즈</button>
            <button>영화</button>
            <button>게임</button>
            <button>NEW! 요즘 대세 콘텐츠</button>
            <button>내가 찜한 리스트</button>
            <button>언어별로 찾아보기</button>
          </div>

          <!-- 화면창lg 이상일 경우 메뉴 상태창 hidden / group으로 묶기 / 현재 div를 기준으로 드롭다운 메뉴들을 absolute해서 아래에 고정 출력  -->
          <div class="relative lg:hidden mt-[0.8vw] group">

            <!-- 메뉴 상태 버튼 -->
            <button class="cursor-pointer list-none">
              메뉴⏷
            </button>

            <!-- 메뉴 상태 버튼에 가져다 댔을 때 (hover) 일 경우 flex 설정 / left-1/2 : 내 왼쪽 끝을 부모의 50%만큼 놓아라 -->
            <!-- translateX는 자기 자신을 기준으로 오른쪽, -translateX는 자기 자신을 기준으로 왼쪽으로 자기자신의 절반만큼(1/2) 가라  -->
            <div
              class="absolute left-1/2 -translate-x-1/2 top-full hidden group-hover:flex flex-col gap-[0.5vw] bg-black/60 w-[12vw]">
              <button class="text-center">홈</button>
              <button class="text-center">시리즈</button>
              <button class="text-center">영화</button>
              <button class="text-center">게임</button>
              <button class="text-center">NEW! 요즘 대세 콘텐츠</button>
              <button class="text-center">내가 찜한 리스트</button>
              <button class="text-center">언어별로 찾아보기</button>
            </div>
          </div>



          <!-- 부모 div의 우측 위 기준으로 스케일이 바뀜, 왼쪽 div와 거리두기 -->
          <div class="origin-top-right ml-auto flex items-center gap-[1vw]">

            <!-- 검색  -->
            <button class="cursor-pointer w-[3.2vw] h-[3.2vw]">
              <img src="./resource/search.png" />
            </button>


            <!-- 알림 -->
            <div class="relative group w-[3.2vw] h-[3.2vw]">

              <button class="cursor-pointer ">
                <img src="./resource/bell.png" />
              </button>

              <div
                class="absolute right-1/2 top-full hidden group-hover:flex flex-col gap-[0.5vw] bg-black/60 w-[14vw]">
                <button class="text-center">홈</button>
                <button class="text-center">시리즈</button>
                <button class="text-center">영화</button>
                <button class="text-center">게임</button>
                <button class="text-center">NEW! 요즘 대세 콘텐츠</button>
                <button class="text-center">내가 찜한 리스트</button>
                <button class="text-center">언어별로 찾아보기</button>
              </div>

            </div>


            <!-- 프로필 -->
            <div class="relative group w-[3.2vw] h-[3.2vw]">

              <button class="cursor-pointer ">
                <img src="./resource/profile.jpg" class="rounded-xl" />
              </button>

              <div
                class="absolute right-1/2 translate-x-1/4 top-full hidden group-hover:flex flex-col gap-[0.5vw] bg-black/60 w-[10vw]">
                <button class="text-center">홈</button>
                <button class="text-center">시리즈</button>
                <button class="text-center">영화</button>
                <button class="text-center">게임</button>
                <button class="text-center">NEW! 요즘 대세 콘텐츠</button>
                <button class="text-center">내가 찜한 리스트</button>
                <button class="text-center">언어별로 찾아보기</button>
              </div>

            </div>
          </div>
        </div>
      </nav>


      <!-- 중간 문구 -->
      <div class="col-start-1 row-start-1 flex flex-col gap-[1.5vw] justify-center ml-[4vw]">

        <img src="./resource/dvd_cover.png" class="w-[20vw] h-[3vw]" />

        <p class="text-[1.2vw]">
          지금, 우리가 사는 지구에서 펼쳐지는 이야기.
        </p>

        <div class="flex gap-[1vw]">

          <button
            class="flex items-center gap-[0.5vw] px-[2vw] py-[0.8vw] bg-white text-black font-semibold rounded text-[1vw]">
            ▶
            <span>재생</span>
          </button>

          <button
            class="flex items-center gap-[0.5vw] px-[2vw] py-[0.8vw] bg-black/30 text-white font-semibold rounded backdrop-blur text-[1vw]">
            <span>ℹ</span>
            <span>상세 정보</span>
          </button>

        </div>
      </div>

  </div>


  <!-- 하단 그라데이션 오버레이(덮어 올리는 레이어) / 방향, 시작, 중간, 끝(투명) -->
  <div class="absolute mt-[47vw] w-full h-[10vw] 
  bg-gradient-to-t from-black via-black to-transparent">
  </div>

  </header>



  <!-- 주요 내용 -->
  <!-- absolute는 부모 기준으로 배치, 부모요소 div의 비율로 왼쪽으로 4% 차지, 넓이는 96%차지 -->
  <main class="absolute top-[44vw] left-[4%] w-[96%] flex flex-col gap-[1.5vw]">

    <section class="flex flex-col gap-[0.5vw]">

      <span class="text-sm">누구나 사랑하는 명작</span>

      <!-- 좌우 갭 section에서 벗어나지 않게 0.3% 적용, overflow로 화면 밖으로 나가는 건 잘라냄, 부모 -->
      <div class="flex gap-[0.3%] overflow-hidden relative border">
        <img src="https://picsum.photos/300/170?random=1" class="w-[23.5%] shrink-0 aspect-video rounded" />
        <img src="https://picsum.photos/300/170?random=2" class="w-[23.5%] shrink-0 aspect-video rounded" />
        <img src="https://picsum.photos/300/170?random=3" class="w-[23.5%] shrink-0 aspect-video rounded" />
        <img src="https://picsum.photos/300/170?random=4" class="w-[23.5%] shrink-0 aspect-video rounded" />
        <img src="https://picsum.photos/300/170?random=5" class="brightness-50 w-[23.5%] shrink-0 aspect-video rounded" />


        <!-- 잘린 영역 위에 올릴 버튼 / 부모기준 위, 우측에서 0만큼 떨어짐, 부모 높이 100%로 차지 -->
        <button class="absolute top-0 right-0 h-full w-[4.80%]
               bg-black/50
               opacity-0 hover:opacity-100
               transition rounded rounded-r-none">
          ❯
        </button>
      </div>


    </section>

  </main>

  </div>

</body>

</html>
